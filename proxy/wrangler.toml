name = "powabetz-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# Secrets are NOT set here (they'd be in source). Set them with:
#   wrangler secret put API_FOOTBALL_KEY
#   wrangler secret put ANTHROPIC_KEY
#   wrangler secret put XAI_KEY
#   wrangler secret put OPENAI_KEY
#   wrangler secret put DEEPSEEK_KEY     # DeepSeek (deterministic draft/ingest model)
#   wrangler secret put PROXY_TOKENS     # comma-separated user tokens
#
# Adding/renaming a ROUTE requires `wrangler deploy` (routes are code);
# setting a secret alone does NOT need a redeploy.
