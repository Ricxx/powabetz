name: Build Windows

# When this runs:
on:
  workflow_dispatch:        # lets you click "Run workflow" by hand in the Actions tab
  push:
    branches: [ main ]      # also builds automatically on every push to main

jobs:
  build-windows:
    runs-on: windows-latest # a real Windows machine, rented from GitHub for the build
    steps:
      # 1. Grab your code
      - uses: actions/checkout@v4

      # 2. Set up Node (for your frontend) and Rust (for Tauri's backend)
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: dtolnay/rust-toolchain@stable

      # 3. Install your frontend dependencies
      #    (change to `yarn install` or `pnpm install` if you don't use npm)
      - name: Install frontend dependencies
        run: npm install

      # 4. Build the Tauri app for Windows
      - name: Build the app
        run: npm run tauri build

      # 5. Hand back the installers as a downloadable zip
      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe